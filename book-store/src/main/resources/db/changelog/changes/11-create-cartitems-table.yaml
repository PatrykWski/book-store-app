databaseChangeLog:
  - changeSet:
      author: Patryk
      id: create-cartitems-table
      changes:
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: shopping_cart_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_shopping_cart
                    references: shopping_carts(id)
              - column:
                  name: book_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_book
                    references: books(id)
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false