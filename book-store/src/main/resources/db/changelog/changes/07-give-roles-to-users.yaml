databaseChangeLog:
  - changeSet:
      author: Patryk
      id: set-roles
      changes:
        - insert:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  value: "1"
              - column:
                  name: role_id
                  valueComputed: "(SELECT id FROM roles WHERE name = 'ADMIN')"
        - insert:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  value: "2"
              - column:
                  name: role_id
                  valueComputed: "(SELECT id FROM roles WHERE name = 'USER')"
